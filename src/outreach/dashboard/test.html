<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outreach — Browser Test Call</title>
<style>
  :root{--bg:#0e1116;--panel:#161b23;--border:#2a3240;--text:#e6ebf2;--muted:#8b96a5;--accent:#4f8cff;--green:#3fb96f;--red:#e05d5d}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:40px 16px}
  h1{font-size:20px;margin-bottom:6px}
  p.sub{color:var(--muted);margin-bottom:24px;text-align:center;max-width:520px}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:560px}
  label{display:block;color:var(--muted);font-size:12px;margin:12px 0 4px;text-transform:uppercase;letter-spacing:.05em}
  input,select{width:100%;background:#1d242f;border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:14px}
  button{width:100%;margin-top:18px;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff}
  button.stop{background:var(--red)}
  #status{margin-top:14px;text-align:center;font-size:13px;color:var(--muted)}
  #log{margin-top:18px;width:100%;max-width:560px;font:12px/1.6 ui-monospace,monospace;color:var(--muted);white-space:pre-wrap;max-height:300px;overflow:auto;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
  .pulse{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--green);margin-right:6px;animation:p 1.2s infinite}
  @keyframes p{50%{opacity:.3}}
</style>
</head>
<body>
<h1>🎙️ Browser Test Call</h1>
<p class="sub">Talks to the <b>exact same pipeline a phone call uses</b> (same WebSocket, STT, LLM, TTS) — just with your mic instead of a telephone. Use headphones to avoid echo.</p>
<div class="panel">
  <label>Agent</label>
  <input id="agent" value="marketplace-support">
  <label>Direction to simulate</label>
  <select id="dir"><option value="inbound">inbound (you call the agent)</option><option value="outbound">outbound (agent calls you)</option></select>
  <button id="btn">▶ Start test call</button>
  <div id="status">idle</div>
</div>
<div id="log"></div>
<script>
const logEl = document.getElementById('log'), statusEl = document.getElementById('status'), btn = document.getElementById('btn');
const log = m => { logEl.textContent += m + "\n"; logEl.scrollTop = logEl.scrollHeight; };
let ws, audioCtx, micStream, procNode, playTime = 0, running = false;

// ---- mu-law codec ----
function pcmToMulaw(s){let sign=(s>>8)&0x80; if(sign)s=-s; if(s>32635)s=32635; s+=132; let exp=7;
  for(let m=0x4000;(s&m)===0&&exp>0;exp--,m>>=1){} let man=(s>>(exp+3))&0x0F; return ~(sign|(exp<<4)|man)&0xFF;}
function mulawToPcm(u){u=~u&0xFF; let sign=u&0x80, exp=(u>>4)&7, man=u&0x0F;
  let s=((man<<3)+132)<<exp; s-=132; return sign?-s:s;}

async function start(){
  const agent = document.getElementById('agent').value.trim();
  const dir = document.getElementById('dir').value;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  micStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  const sid = 'TEST' + Math.random().toString(36).slice(2,10).toUpperCase();

  ws.onopen = () => {
    log('websocket open — sending Twilio-style handshake');
    ws.send(JSON.stringify({event:'connected', protocol:'Call', version:'1.0.0'}));
    ws.send(JSON.stringify({event:'start', sequenceNumber:'1', start:{
      accountSid:'TESTACCOUNT', streamSid:'MZ'+sid, callSid:'CA'+sid,
      tracks:['inbound'], mediaFormat:{encoding:'audio/x-mulaw', sampleRate:8000, channels:1},
      customParameters:{agent_id:agent, direction:dir}
    }, streamSid:'MZ'+sid}));
    startMic('MZ'+sid);
    statusEl.innerHTML = '<span class="pulse"></span>live — speak now (agent may take a few seconds first time)';
  };
  ws.onmessage = ev => {
    let msg; try{ msg = JSON.parse(ev.data); }catch(e){ return; }
    if (msg.event === 'media' && msg.media && msg.media.payload) playMulaw(msg.media.payload);
    else if (msg.event === 'clear') { playTime = audioCtx.currentTime; log('(agent interrupted — cleared audio)'); }
    else if (msg.event !== 'media') log('server event: ' + (msg.event||ev.data.slice(0,80)));
  };
  ws.onclose = e => { log('websocket closed (' + e.code + ')'); stop(false); };
  ws.onerror = () => log('websocket error');
}

function startMic(streamSid){
  const src = audioCtx.createMediaStreamSource(micStream);
  procNode = audioCtx.createScriptProcessor(4096, 1, 1);
  const ratio = audioCtx.sampleRate / 8000;
  src.connect(procNode); procNode.connect(audioCtx.destination);
  procNode.onaudioprocess = e => {
    if (!ws || ws.readyState !== 1) return;
    const inp = e.inputBuffer.getChannelData(0);
    const outLen = Math.floor(inp.length / ratio);
    const bytes = new Uint8Array(outLen);
    for (let i = 0; i < outLen; i++){
      const s = Math.max(-1, Math.min(1, inp[Math.floor(i*ratio)]));
      bytes[i] = pcmToMulaw((s * 32767) | 0);
    }
    let bin=''; for (const b of bytes) bin += String.fromCharCode(b);
    ws.send(JSON.stringify({event:'media', streamSid, media:{payload: btoa(bin)}}));
  };
}

function playMulaw(b64){
  const bin = atob(b64), n = bin.length;
  const buf = audioCtx.createBuffer(1, n * (audioCtx.sampleRate/8000), audioCtx.sampleRate);
  const ch = buf.getChannelData(0);
  const up = audioCtx.sampleRate/8000;
  for (let i = 0; i < n; i++){
    const v = mulawToPcm(bin.charCodeAt(i)) / 32768;
    const base = Math.floor(i*up);
    for (let j = 0; j < up; j++) ch[base+j] = v;
  }
  const srcN = audioCtx.createBufferSource();
  srcN.buffer = buf; srcN.connect(audioCtx.destination);
  if (playTime < audioCtx.currentTime) playTime = audioCtx.currentTime + 0.05;
  srcN.start(playTime); playTime += buf.duration;
}

function stop(closeWs = true){
  running = false; btn.textContent = '▶ Start test call'; btn.classList.remove('stop');
  statusEl.textContent = 'idle';
  try{ procNode && procNode.disconnect(); }catch(e){}
  try{ micStream && micStream.getTracks().forEach(t=>t.stop()); }catch(e){}
  if (closeWs) try{ ws && ws.close(); }catch(e){}
}

btn.onclick = async () => {
  if (running){ stop(); log('stopped'); return; }
  running = true; btn.textContent = '■ End test call'; btn.classList.add('stop');
  logEl.textContent = '';
  try{ await start(); }catch(e){ log('failed: ' + e.message); stop(); }
};
</script>
</body>
</html>

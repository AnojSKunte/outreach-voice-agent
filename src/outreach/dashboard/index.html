<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outreach — AI Calling Agent</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b23; --panel2:#1d242f; --border:#2a3240;
    --text:#e6ebf2; --muted:#8b96a5; --accent:#4f8cff; --green:#3fb96f;
    --red:#e05d5d; --amber:#e0a83f; --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,'Segoe UI',Roboto,sans-serif}
  header{display:flex;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--panel)}
  header h1{font-size:17px;font-weight:600}
  header .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}
  header input{margin-left:auto;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;width:220px}
  nav{display:flex;gap:4px;padding:10px 24px;border-bottom:1px solid var(--border)}
  nav button{background:none;border:none;color:var(--muted);padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px}
  nav button.active{background:var(--panel2);color:var(--text)}
  main{padding:20px 24px;max-width:1200px;margin:0 auto}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
  .card .v{font-size:24px;font-weight:650;margin-top:2px}
  .card .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  th,td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
  th{color:var(--muted);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:none}
  tr.click{cursor:pointer} tr.click:hover td{background:var(--panel2)}
  .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:600}
  .pill.green{background:rgba(63,185,111,.15);color:var(--green)}
  .pill.red{background:rgba(224,93,93,.15);color:var(--red)}
  .pill.amber{background:rgba(224,168,63,.15);color:var(--amber)}
  .pill.blue{background:rgba(79,140,255,.15);color:var(--accent)}
  .pill.gray{background:rgba(139,150,165,.15);color:var(--muted)}
  .bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .bar h2{font-size:15px;font-weight:600;margin-right:auto}
  button.btn{background:var(--accent);border:none;color:#fff;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:550}
  button.btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
  button.btn.sm{padding:4px 10px;font-size:12px}
  dialog{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:22px;max-width:640px;width:92%;max-height:84vh;overflow:auto}
  dialog::backdrop{background:rgba(0,0,0,.6)}
  dialog h3{margin-bottom:14px;font-size:15px}
  form.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  form.grid label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
  form.grid label.full{grid-column:1/-1}
  form.grid input,form.grid select,form.grid textarea{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px}
  .turn{padding:8px 12px;border-radius:8px;margin:6px 0;max-width:85%}
  .turn.assistant{background:var(--panel2)}
  .turn.user{background:rgba(79,140,255,.12);margin-left:auto}
  .turn .who{font-size:11px;color:var(--muted);margin-bottom:2px}
  .muted{color:var(--muted)} .empty{padding:28px;text-align:center;color:var(--muted)}
  footer{padding:14px 24px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
<header>
  <h1><span class="dot"></span>Outreach</h1>
  <span class="muted">AI Calling Agent</span>
  <input id="apikey" type="password" placeholder="API key (X-API-Key)" title="Stored locally in your browser">
</header>
<nav>
  <button data-tab="overview" class="active">Overview</button>
  <button data-tab="campaigns">Campaigns</button>
  <button data-tab="leads">Leads</button>
  <button data-tab="calls">Calls</button>
  <button data-tab="agents">Agents</button>
  <button data-tab="dnc">DNC</button>
</nav>
<main id="main"></main>
<footer>Outreach voice agent platform — auto-refreshes every 10s</footer>

<dialog id="modal"></dialog>

<script>
const $ = s => document.querySelector(s);
const main = $('#main'), modal = $('#modal');
let tab = 'overview';

const keyInput = $('#apikey');
keyInput.value = localStorage.getItem('outreach_key') || '';
keyInput.addEventListener('change', () => { localStorage.setItem('outreach_key', keyInput.value); render(); });

async function api(path, opts = {}) {
  opts.headers = Object.assign({'X-API-Key': keyInput.value}, opts.headers || {});
  const r = await fetch('/api/v1' + path, opts);
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.statusText);
  return r.json();
}
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pillClass = s => ({completed:'green',in_progress:'blue',running:'green',interested:'green',converted:'green',
  failed:'red',dnc:'red',not_interested:'red',no_answer:'amber',busy:'amber',voicemail:'amber',callback:'amber',
  queued:'blue',calling:'blue',ringing:'blue',paused:'amber',new:'gray',draft:'gray'}[s] || 'gray');
const pill = s => `<span class="pill ${pillClass(s)}">${esc(s||'—')}</span>`;
const fmtT = t => t ? new Date(t).toLocaleString() : '—';

document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); tab = b.dataset.tab; render();
});

async function render() {
  try { await ({overview, campaigns, leads, calls, agents, dnc})[tab](); }
  catch (e) { main.innerHTML = `<div class="empty">⚠️ ${esc(e.message)}<br><span class="muted">Check the API key in the top right, or that the server is running.</span></div>`; }
}

async function overview() {
  const s = await api('/stats');
  const cbs = s.calls_by_status || {}, lbs = s.leads_by_status || {};
  main.innerHTML = `
    <div class="cards">
      <div class="card"><div class="l">Total calls</div><div class="v">${s.calls_total}</div></div>
      <div class="card"><div class="l">Talk minutes</div><div class="v">${s.talk_minutes}</div></div>
      <div class="card"><div class="l">Est. cost (USD)</div><div class="v">$${s.estimated_cost_usd}</div></div>
      <div class="card"><div class="l">Leads</div><div class="v">${s.leads_total}</div></div>
      <div class="card"><div class="l">Campaigns running</div><div class="v">${s.campaigns_running}</div></div>
      <div class="card"><div class="l">Interested leads</div><div class="v">${lbs.interested||0}</div></div>
    </div>
    <div class="bar"><h2>Calls by status</h2></div>
    <table><tr>${Object.keys(cbs).map(k=>`<th>${esc(k)}</th>`).join('')||'<th class="muted">no calls yet</th>'}</tr>
    <tr>${Object.values(cbs).map(v=>`<td>${v}</td>`).join('')||'<td class="muted">Place your first call from the Leads tab</td>'}</tr></table>
    <div style="height:16px"></div>
    <div class="bar"><h2>Lead pipeline</h2></div>
    <table><tr>${Object.keys(lbs).map(k=>`<th>${esc(k)}</th>`).join('')||'<th class="muted">no leads yet</th>'}</tr>
    <tr>${Object.values(lbs).map(v=>`<td>${v}</td>`).join('')||'<td class="muted">Import a CSV from the Leads tab</td>'}</tr></table>`;
}

async function campaigns() {
  const [list, ags] = await Promise.all([api('/campaigns'), api('/agents')]);
  main.innerHTML = `
    <div class="bar"><h2>Campaigns</h2><button class="btn" id="newC">+ New campaign</button></div>
    <table><tr><th>Name</th><th>Agent</th><th>Status</th><th>Leads</th><th>Calls</th><th>Minutes</th><th>Cost</th><th></th></tr>
    ${list.map(c => `<tr>
      <td><b>${esc(c.name)}</b><br><span class="muted">${esc(c.goal).slice(0,70)}</span></td>
      <td>${esc(c.agent_id)}</td><td>${pill(c.status)}</td>
      <td>${c.stats.leads_total}</td><td>${c.stats.calls_total}</td>
      <td>${c.stats.talk_minutes}</td><td>$${c.stats.estimated_cost_usd}</td>
      <td>${c.status==='running'
        ? `<button class="btn sm ghost" onclick="cAct('${c.id}','pause')">Pause</button>`
        : `<button class="btn sm" onclick="cAct('${c.id}','start')">Start</button>`}</td>
    </tr>`).join('') || '<tr><td colspan="8" class="empty">No campaigns yet — create one, attach leads, hit Start.</td></tr>'}</table>`;
  $('#newC').onclick = () => {
    modal.innerHTML = `<h3>New campaign</h3><form class="grid" id="cf">
      <label class="full">Name<input name="name" required placeholder="July lead follow-ups"></label>
      <label>Agent<select name="agent_id">${ags.map(a=>`<option>${esc(a.agent_id)}</option>`).join('')}</select></label>
      <label>Max concurrent calls<input name="max_concurrent_calls" type="number" value="3" min="1"></label>
      <label class="full">Goal for each call<textarea name="goal" rows="2" placeholder="Qualify interest in X and book a follow-up"></textarea></label>
      <label>Calling hours start<input name="calling_hours_start" type="number" value="10" min="0" max="23"></label>
      <label>Calling hours end<input name="calling_hours_end" type="number" value="19" min="1" max="24"></label>
      <label>Max attempts / lead<input name="max_attempts_per_lead" type="number" value="3" min="1"></label>
      <label>Retry gap (minutes)<input name="retry_minutes" type="number" value="240" min="5"></label>
      <label class="full">Timezone<input name="timezone" value="Asia/Kolkata"></label>
      <label class="full"><button class="btn">Create</button></label></form>`;
    modal.showModal();
    $('#cf').onsubmit = async e => {
      e.preventDefault();
      const d = Object.fromEntries(new FormData(e.target));
      ['max_concurrent_calls','max_attempts_per_lead','retry_minutes','calling_hours_start','calling_hours_end'].forEach(k=>d[k]=+d[k]);
      await api('/campaigns', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
      modal.close(); render();
    };
  };
}
window.cAct = async (id, act) => { await api(`/campaigns/${id}/${act}`, {method:'POST'}); render(); };

async function leads() {
  const [list, camps] = await Promise.all([api('/leads?limit=200'), api('/campaigns')]);
  main.innerHTML = `
    <div class="bar"><h2>Leads</h2>
      <select id="csvCamp" style="background:var(--panel2);color:var(--text);border:1px solid var(--border);padding:6px;border-radius:6px">
        <option value="">no campaign</option>${camps.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select>
      <label class="btn ghost" style="cursor:pointer">Import CSV<input id="csv" type="file" accept=".csv" hidden></label>
      <button class="btn" id="addL">+ Add lead</button></div>
    <table><tr><th>Name</th><th>Phone</th><th>Company</th><th>Status</th><th>Attempts</th><th>Campaign</th><th></th></tr>
    ${list.map(l => `<tr>
      <td>${esc(l.name||'—')}</td><td>${esc(l.phone)}</td><td>${esc(l.company||'—')}</td>
      <td>${pill(l.status)}</td><td>${l.attempts}</td><td class="muted">${esc(l.campaign_id||'—')}</td>
      <td><button class="btn sm" onclick="callLead('${l.id}')">Call now</button></td></tr>`).join('')
      || '<tr><td colspan="7" class="empty">No leads. Import a CSV (columns: phone, name, company, email, notes, + any custom) or add one.</td></tr>'}</table>`;
  $('#csv').onchange = async e => {
    const fd = new FormData(); fd.append('file', e.target.files[0]);
    const camp = $('#csvCamp').value;
    const r = await api('/leads/import' + (camp?`?campaign_id=${camp}`:''), {method:'POST', body:fd});
    alert(`Imported ${r.created} leads (${r.skipped_no_phone} skipped)`); render();
  };
  $('#addL').onclick = () => {
    modal.innerHTML = `<h3>Add lead</h3><form class="grid" id="lf">
      <label>Phone (E.164)<input name="phone" required placeholder="+919876543210"></label>
      <label>Name<input name="name"></label><label>Company<input name="company"></label>
      <label>Email<input name="email"></label>
      <label class="full">Notes<textarea name="notes" rows="2"></textarea></label>
      <label class="full"><button class="btn">Add</button></label></form>`;
    modal.showModal();
    $('#lf').onsubmit = async e => {
      e.preventDefault();
      await api('/leads', {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(Object.fromEntries(new FormData(e.target)))});
      modal.close(); render();
    };
  };
}
window.callLead = async id => {
  if (!confirm('Place an outbound call to this lead now?')) return;
  try { const r = await api('/calls', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({lead_id:id})});
    alert('Call started: ' + r.call_id); } catch(e){ alert('Failed: ' + e.message); }
  render();
};

async function calls() {
  const list = await api('/calls?limit=100');
  main.innerHTML = `
    <div class="bar"><h2>Calls</h2></div>
    <table><tr><th>When</th><th>Dir</th><th>Agent</th><th>Number</th><th>Status</th><th>Outcome</th><th>Dur (s)</th><th>Cost</th></tr>
    ${list.map(c => `<tr class="click" onclick="showCall('${c.id}')">
      <td>${fmtT(c.created_at)}</td><td>${c.direction==='inbound'?'📥':'📤'}</td>
      <td>${esc(c.agent_id)}</td><td>${esc(c.direction==='inbound'?c.from_number:c.to_number)}</td>
      <td>${pill(c.status)}</td><td>${pill(c.outcome)}</td>
      <td>${c.duration_seconds ?? '—'}</td><td>${c.estimated_cost_usd!=null?'$'+c.estimated_cost_usd:'—'}</td></tr>`).join('')
      || '<tr><td colspan="8" class="empty">No calls yet.</td></tr>'}</table>`;
}
window.showCall = async id => {
  const c = await api('/calls/' + id);
  modal.innerHTML = `<h3>Call ${esc(id.slice(0,8))} — ${pill(c.status)} ${pill(c.outcome)}</h3>
    ${c.summary ? `<p style="margin-bottom:12px">${esc(c.summary)}</p>` : ''}
    ${Object.keys(c.extracted||{}).length ? `<p class="muted" style="margin-bottom:12px">Extracted: ${esc(JSON.stringify(c.extracted))}</p>` : ''}
    <div>${(c.transcript||[]).map(t => `<div class="turn ${t.role==='assistant'?'assistant':'user'}">
      <div class="who">${t.role==='assistant'?'🤖 Agent':'👤 Caller'}</div>${esc(t.content)}</div>`).join('')
      || '<p class="muted">No transcript captured.</p>'}</div>
    <div style="margin-top:14px"><button class="btn ghost" onclick="modal.close()">Close</button></div>`;
  modal.showModal();
};

async function agents() {
  const list = await api('/agents');
  main.innerHTML = `
    <div class="bar"><h2>Agents</h2><span class="muted">Agents are YAML configs in <code>agents/&lt;id&gt;/</code> — add a folder, restart, done.</span></div>
    <table><tr><th>Agent</th><th>Client</th><th>Persona</th><th>Language</th><th>Profile</th><th>Number</th><th>Actions</th></tr>
    ${list.map(a => `<tr><td><b>${esc(a.agent_id)}</b></td><td>${esc(a.client_name)}</td>
      <td>${esc(a.persona.name)} — ${esc(a.persona.role)}</td><td>${esc(a.language)}</td>
      <td>${pill(a.profile)}</td><td>${esc(a.phone_number||'—')}</td>
      <td class="muted">${a.allowed_actions.map(esc).join(', ')||'—'}</td></tr>`).join('')}</table>`;
}

async function dnc() {
  const list = await api('/dnc');
  main.innerHTML = `
    <div class="bar"><h2>Do-Not-Call list</h2><button class="btn" id="addD">+ Add number</button></div>
    <p class="muted" style="margin-bottom:12px">Numbers here are never dialed by campaigns. Leads who ask not to be called are added automatically.</p>
    <table><tr><th>Phone</th><th>Reason</th><th>Added</th><th></th></tr>
    ${list.map(e => `<tr><td>${esc(e.phone)}</td><td>${esc(e.reason||'—')}</td><td>${fmtT(e.created_at)}</td>
      <td><button class="btn sm ghost" onclick="rmDnc('${esc(e.phone)}')">Remove</button></td></tr>`).join('')
      || '<tr><td colspan="4" class="empty">Empty.</td></tr>'}</table>`;
  $('#addD').onclick = async () => {
    const p = prompt('Phone number (E.164):'); if (!p) return;
    await api('/dnc?phone=' + encodeURIComponent(p), {method:'POST'}); render();
  };
}
window.rmDnc = async p => { await api('/dnc/' + encodeURIComponent(p), {method:'DELETE'}); render(); };

render();
setInterval(() => { if (!modal.open) render(); }, 10000);
</script>
</body>
</html>

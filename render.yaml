# Render blueprint — one-click deploy (currently FREE tier for demo).
#
# FREE TIER NOTES:
#  * The service sleeps after ~15 min idle; first request after that takes
#    ~1 min to wake. Open the dashboard URL to wake it BEFORE a test call.
#  * No persistent disk on free: the SQLite DB resets on each deploy/restart.
#    Fine for demos.
#
# GOING TO PRODUCTION (later): change plan to `starter`, uncomment the disk
# block (or set DATABASE_URL to a managed Postgres), and redeploy.
#
# Secrets (GROQ_API_KEY, SARVAM_API_KEY, TWILIO_*, etc.) are added in the
# Render dashboard: your service -> Environment -> Add Environment Variable.
# The full list of supported vars is in .env.example.

services:
  - type: web
    name: outreach-voice-agent
    runtime: python
    plan: free
    region: singapore        # closest Render region to India
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn outreach.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # --- production upgrade (uncomment when moving off free) ---
    # plan: starter
    # disk:
    #   name: outreach-data
    #   mountPath: /data
    #   sizeGB: 1
    envVars:
      - key: PYTHONPATH
        value: src
      # PUBLIC_HOST is intentionally NOT set here: the code falls back to
      # RENDER_EXTERNAL_HOSTNAME, which Render injects with the real public
      # hostname. (fromService host returns the internal name — wrong for
      # telephony webhooks/websockets.)
      - key: OUTREACH_API_KEY
        generateValue: true   # strong key auto-generated; view it in Environment tab
      - key: DEFAULT_PROFILE
        value: budget         # Sarvam + Groq (free-credit stack); switch to premium later
      - key: BUDGET_LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: DEFAULT_AGENT_ID
        value: marketplace-support
